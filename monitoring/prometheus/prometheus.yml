global:
    scrape_interval: 15s
    evaluation_interval: 15s
    external_labels:
        monitor: "api-monitor"
        environment: "production"

alerting:
    alertmanagers:
        - static_configs:
              - targets:
                    - alertmanager:9093

rule_files:
    - "/etc/prometheus/alerting-rules/*.yml"

scrape_configs:
    - job_name: "api"
      static_configs:
          - targets: ["api:3000"]
      scrape_interval: 10s
      metrics_path: "/metrics"

    - job_name: "prometheus"
      static_configs:
          - targets: ["localhost:9090"]

    - job_name: "alertmanager"
      static_configs:
          - targets: ["alertmanager:9093"]

    - job_name: "redis"
      static_configs:
          - targets: ["redis-exporter:9121"]
