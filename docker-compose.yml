networks:
    api-network:
        driver: bridge
        external: false

services:
    api:
        build: .
        ports:
            - "3000:3000"
        environment:
            - NODE_ENV=production
        env_file:
            - .env
        restart: unless-stopped
        networks:
            - api-network
        depends_on:
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s

    api-dev:
        build:
            context: .
            target: development
        ports:
            - "3000:3000"
        environment:
            - NODE_ENV=development
            - PORT=3000
            - REDIS_URL=redis://redis:6379
            - DATABASE_URL=postgresql://johndoe:randompassword@postgres:5432/mydb?schema=public
        env_file:
            - .env
        volumes:
            - ./src:/usr/src/app/src
            - ./prisma:/usr/src/app/prisma
            - ./scripts:/usr/src/app/scripts
            - ./package.json:/usr/src/app/package.json:ro
            - ./tsconfig.json:/usr/src/app/tsconfig.json:ro
        command: ["sh", "./scripts/docker-dev-entrypoint.sh"]
        restart: unless-stopped
        networks:
            - api-network
        depends_on:
            redis:
                condition: service_healthy
            postgres:
                condition: service_healthy
        profiles:
            - dev

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        restart: unless-stopped
        networks:
            - api-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 30s
            timeout: 10s
            retries: 3

    postgres:
        image: postgres:15-alpine
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: johndoe
            POSTGRES_PASSWORD: randompassword
            POSTGRES_DB: mydb
        volumes:
            - postgres_data:/var/lib/postgresql/data
        restart: unless-stopped
        networks:
            - api-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U johndoe -d mydb"]
            interval: 10s
            timeout: 5s
            retries: 5

    prometheus:
        image: prom/prometheus:latest
        ports:
            - "9090:9090"
        volumes:
            - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - ./monitoring/alerting-rules:/etc/prometheus/alerting-rules:ro
            - prometheus_data:/prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.console.libraries=/usr/share/prometheus/console_libraries"
            - "--web.console.templates=/usr/share/prometheus/consoles"
            - "--web.enable-lifecycle"
        restart: unless-stopped
        networks:
            - api-network

    alertmanager:
        image: prom/alertmanager:latest
        ports:
            - "9093:9093"
        volumes:
            - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
            - alertmanager_data:/alertmanager
        command:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
        restart: unless-stopped
        networks:
            - api-network

    # Optional: Grafana for visualization
    grafana:
        image: grafana/grafana:latest
        ports:
            - "3001:3000"
        environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=admin
            - GF_USERS_ALLOW_SIGN_UP=false
        volumes:
            - grafana_data:/var/lib/grafana
            - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
        restart: unless-stopped
        networks:
            - api-network
        depends_on:
            - prometheus

volumes:
    redis_data:
    postgres_data:
    prometheus_data:
    alertmanager_data:
    grafana_data:
